name: Update plant database from Google Sheet

# Rebuilds plant-data.js from the published "Native Plants Reference Sheet"
# and commits any changes, so the searchable Plant Database page stays in
# sync with the sheet. The editor only ever edits the Google Sheet.
#
# Runs automatically every night, and can also be run on demand from the
# Actions tab ("Run workflow"). If the sheet can't be read or its layout
# changed, scripts/build-plant-data.js aborts and this job fails without
# committing anything.

on:
  schedule:
    # 08:30 UTC daily ≈ 4:30 AM Eastern (EDT) / 3:30 AM (EST) — overnight.
    - cron: '30 8 * * *'
  workflow_dispatch: {}

# Never let two runs overlap.
concurrency:
  group: update-plant-data
  cancel-in-progress: false

# Allow the built-in token to commit the regenerated file back to the repo.
permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the rebase-retry below works

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild plant-data.js from the sheet
        run: node scripts/build-plant-data.js

      - name: Commit and push if anything changed
        run: |
          if [ -z "$(git status --porcelain plant-data.js plant-database.html)" ]; then
            echo "Site already matches the sheet — nothing to commit."
            exit 0
          fi
          git config user.name  "commonwild-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plant-data.js plant-database.html
          git commit \
            -m "Auto-update plant database from Google Sheet" \
            -m "Regenerated by the scheduled update-plant-data workflow. Source of truth: the published Native Plants Reference Sheet."
          # Retry once with a rebase in case main advanced during the run.
          git push || {
            echo "Push rejected; rebasing on latest main and retrying."
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          }
